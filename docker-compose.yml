services:
  postgres:
    container_name: postgres-sql-jobconsulting
    image: postgres:16
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: job_consulting
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - spring-demo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d job_consulting"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: job-consulting-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/job_consulting
      SPRING_DATASOURCE_USERNAME: username
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_DRIVERCLASSNAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_H2_CONSOLE_ENABLED: "false"
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8080:8080"
    networks:
      - spring-demo
    restart: unless-stopped


  frontend:
    container_name: job-consulting-frontend
    build:
      context: ./frontend/job-consulting-platform-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - spring-demo

networks:
  spring-demo:
    driver: bridge

volumes:
  postgres:
    driver: local